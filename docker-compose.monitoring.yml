# ════════════════════════════════════════════════════════════
# NinjaBackup — Monitoring Stack
# Prometheus + Grafana + node-exporter + cAdvisor
#
# Compose this alongside docker-compose.prod.yml:
#   docker compose -f docker-compose.prod.yml -f docker-compose.monitoring.yml up -d
# ════════════════════════════════════════════════════════════

services:
  prometheus:
    image: prom/prometheus:v2.54.1
    restart: always
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - internal
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:9090/-/ready || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:11.2.2
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-https://grafana.backup.itninja.co.il}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
    networks:
      - internal
      - proxy
    depends_on:
      - prometheus
    labels:
      - 'coolify.managed=true'

  node-exporter:
    image: prom/node-exporter:v1.8.2
    restart: always
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - internal

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: always
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - internal

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    restart: always
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:-ninja}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ninjabackup}?sslmode=disable
    networks:
      - internal
    depends_on:
      - prometheus

  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    restart: always
    environment:
      REDIS_ADDR: redis://redis:6379
    networks:
      - internal
    depends_on:
      - prometheus

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  internal:
    external: true
    name: ninjabackup_internal
  proxy:
    external: true
