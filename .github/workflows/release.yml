name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}/ninjabackup

jobs:
  build-agent:
    name: Build Agent (${{ matrix.target.os }}/${{ matrix.target.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - { os: linux,   arch: amd64, ext: '' }
          - { os: linux,   arch: arm64, ext: '' }
          - { os: darwin,  arch: amd64, ext: '' }
          - { os: darwin,  arch: arm64, ext: '' }
          - { os: windows, arch: amd64, ext: '.exe' }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: apps/agent/go.sum
      - name: Build
        working-directory: apps/agent
        env:
          GOOS: ${{ matrix.target.os }}
          GOARCH: ${{ matrix.target.arch }}
          CGO_ENABLED: 0
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          [ -z "$VERSION" ] && VERSION="${{ inputs.version }}"
          mkdir -p dist
          go build -trimpath \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o dist/ninjabackup-agent-${VERSION}-${{ matrix.target.os }}-${{ matrix.target.arch }}${{ matrix.target.ext }} \
            ./cmd/agent
      - name: SHA-256 checksum
        working-directory: apps/agent/dist
        run: sha256sum * > checksums.txt
      - uses: actions/upload-artifact@v4
        with:
          name: agent-${{ matrix.target.os }}-${{ matrix.target.arch }}
          path: apps/agent/dist/*

  publish-images:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute version
        id: ver
        run: |
          if [ -n "${{ github.ref_name }}" ] && [[ "${{ github.ref_name }}" == v* ]]; then
            echo "tag=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ inputs.version }}" >> $GITHUB_OUTPUT
          fi
      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-api:${{ steps.ver.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build & push Web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-web:${{ steps.ver.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create GitHub Release
    needs: [build-agent, publish-images]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: agent-*
          merge-multiple: true
      - name: Generate release notes
        run: |
          echo "## NinjaBackup ${GITHUB_REF_NAME}" > NOTES.md
          echo "" >> NOTES.md
          echo "### Container images" >> NOTES.md
          echo "- \`ghcr.io/${GITHUB_REPOSITORY_OWNER}/ninjabackup-api:${GITHUB_REF_NAME#v}\`" >> NOTES.md
          echo "- \`ghcr.io/${GITHUB_REPOSITORY_OWNER}/ninjabackup-web:${GITHUB_REF_NAME#v}\`" >> NOTES.md
          echo "" >> NOTES.md
          echo "### Agent binaries" >> NOTES.md
          ls artifacts | sed 's/^/- /' >> NOTES.md
      - uses: softprops/action-gh-release@v2
        with:
          body_path: NOTES.md
          files: |
            artifacts/*
            artifacts/checksums.txt
          generate_release_notes: true
